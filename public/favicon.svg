<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Red octagon (stop sign shape) -->
  <polygon points="19,2 45,2 62,19 62,45 45,62 19,62 2,45 2,19" fill="#e53e3e" stroke="#c53030" stroke-width="2"/>
  <!-- White raised hand -->
  <g fill="#fff">
    <!-- Palm -->
    <rect x="24" y="26" width="16" height="20" rx="3"/>
    <!-- Thumb -->
    <rect x="19" y="30" width="7" height="10" rx="3"/>
    <!-- Fingers -->
    <rect x="25" y="16" width="4" height="14" rx="2"/>
    <rect x="30" y="14" width="4" height="16" rx="2"/>
    <rect x="35" y="16" width="4" height="14" rx="2"/>
    <!-- Wrist -->
    <rect x="26" y="44" width="12" height="6" rx="2"/>
  </g>
</svg>
